name: Build and Deploy Vyla Home

on:
  push:
    branches:
      - main
    paths:
      - 'build-pipeline.js'
      - 'package.json'
      - 'config/**'
      - '.github/workflows/build-deploy.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Clone private repositories and build
        env:
          GITHUB_TOKEN: ${{ secrets.VYLA_GITHUB_TOKEN }}
          PLAYER_TMDB_KEY: ${{ secrets.TMDB_KEY }}
          PLAYER_API_KEY: ${{ secrets.API_KEY }}
          "STREAM-API_TMDB_API_KEY": ${{ secrets.TMDB_API_KEY }}
          "STREAM-API_DATABASE_URL": ${{ secrets.DATABASE_URL }}
          "STREAM-API_GA_API_SECRET": ${{ secrets.GA_API_SECRET }}
          "STREAM-API_GA_MEASUREMENT_ID": ${{ secrets.GA_MEASUREMENT_ID }}
          "STREAM-API_TOKEN_SECRET": ${{ secrets.TOKEN_SECRET }}
          BUILD_SALT: ${{ secrets.BUILD_SALT }}
        run: |
          echo "Starting secure build process..."
          node build-pipeline.js

      - name: Verify build artifacts
        run: |
          if (Test-Path "update-payload.zip") {
            Write-Host "✓ Build artifact verified: update-payload.zip exists"
            $size = (Get-Item update-payload.zip).Length
            Write-Host "  Size: $size bytes"
          } else {
            Write-Error "✗ Build artifact missing: update-payload.zip"
            exit 1
          }

          if (Test-Path "manifest.json") {
            Write-Host "✓ Manifest file verified"
            Get-Content manifest.json | ConvertFrom-Json | ConvertTo-Json -Depth 10
          } else {
            Write-Error "✗ Manifest file missing"
            exit 1
          }

          if (Test-Path "integrity-report.json") {
            Write-Host "✓ Integrity report verified"
          } else {
            Write-Warning "⚠ Integrity report missing (non-critical)"
          }

      - name: Package Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Write-Host "Packaging Electron application..."
          npm run dist
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vyla-home-build
          path: |
            update-payload.zip
            manifest.json
            integrity-report.json
            validation-report.json
          retention-days: 30

      - name: Upload Electron installer (if available)
        uses: actions/upload-artifact@v4
        with:
          name: vyla-home-installer
          path: dist/*.exe
          retention-days: 30
        if: success()

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Vyla Home Release ${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            update-payload.zip
            manifest.json
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}