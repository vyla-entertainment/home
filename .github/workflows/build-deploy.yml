name: Build and Deploy Vyla Home

on:
  push:
    branches:
      - main
    paths:
      - 'build-pipeline.js'
      - 'package.json'
      - 'config/**'
      - 'main.js'
      - 'service-manager.js'
      - 'patcher.js'
      - 'credential-manager.js'
      - 'crypto-utils.js'
      - 'update-client.js'
      - '.github/workflows/build-deploy.yml'
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore last-known commit SHAs
        id: cache-shas
        uses: actions/cache@v4
        with:
          path: last-shas.json
          key: vyla-home-last-shas

      - name: Check for upstream changes
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.VYLA_GITHUB_TOKEN }}
        run: |
          $repos = @('frontend', 'player', 'stream-api', 'live-api-streampk')
          $last = @{}
          if (Test-Path "last-shas.json") {
            $last = Get-Content last-shas.json | ConvertFrom-Json -AsHashtable
          }

          $current = @{}
          $changed = $false

          foreach ($repo in $repos) {
            $uri = "https://api.github.com/repos/vyla-entertainment/$repo/commits/main"
            $headers = @{
              Authorization = "Bearer $env:GITHUB_TOKEN"
              Accept        = "application/vnd.github+json"
            }
            $resp = Invoke-RestMethod -Uri $uri -Headers $headers
            $sha = $resp.sha
            $current[$repo] = $sha

            if (-not $last.ContainsKey($repo) -or $last[$repo] -ne $sha) {
              Write-Host "Change detected in $repo : $sha"
              $changed = $true
            } else {
              Write-Host "No change in $repo"
            }
          }

          $current | ConvertTo-Json | Set-Content last-shas.json

          if ("${{ github.event_name }}" -ne "schedule") {
            $changed = $true
          }

          echo "changed=$changed" >> $env:GITHUB_OUTPUT

      - name: Clone private repositories and build
        if: steps.check.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.VYLA_GITHUB_TOKEN }}
          PLAYER_TMDB_KEY: ${{ secrets.TMDB_KEY }}
          PLAYER_API_KEY: ${{ secrets.API_KEY }}
          STREAM_API_TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          STREAM_API_DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STREAM_API_GA_API_SECRET: ${{ secrets.GA_API_SECRET }}
          STREAM_API_GA_MEASUREMENT_ID: ${{ secrets.GA_MEASUREMENT_ID }}
          STREAM_API_TOKEN_SECRET: ${{ secrets.TOKEN_SECRET }}
        run: |
          echo "Starting secure build process..."
          node build-pipeline.js

      - name: Verify build artifacts
        if: steps.check.outputs.changed == 'true'
        run: |
          if (Test-Path "update-payload.zip") {
            Write-Host "✓ Build artifact verified: update-payload.zip exists"
            $size = (Get-Item update-payload.zip).Length
            Write-Host "  Size: $size bytes"
          } else {
            Write-Error "✗ Build artifact missing: update-payload.zip"
            exit 1
          }

          if (Test-Path "manifest.json") {
            Write-Host "✓ Manifest file verified"
            Get-Content manifest.json | ConvertFrom-Json | ConvertTo-Json -Depth 10
          } else {
            Write-Error "✗ Manifest file missing"
            exit 1
          }

          if (Test-Path "validation-report.json") {
            Write-Host "✓ Validation report verified"
          } else {
            Write-Warning "⚠ Validation report missing (non-critical)"
          }

      - name: Package Electron app
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Write-Host "Packaging Electron application..."
          npm run dist

      - name: Upload build artifacts
        if: steps.check.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: vyla-home-build
          path: |
            update-payload.zip
            manifest.json
            validation-report.json
          retention-days: 30

      - name: Upload Electron installer (if available)
        uses: actions/upload-artifact@v4
        with:
          name: vyla-home-installer
          path: dist/*.exe
          retention-days: 30
        if: success() && steps.check.outputs.changed == 'true'

      - name: Create GitHub Release
        if: steps.check.outputs.changed == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Vyla Home Release ${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            update-payload.zip
            manifest.json
            dist/*.exe
            dist/*.exe.blockmap
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}